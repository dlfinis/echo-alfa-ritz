# wrangler.toml — Cloudflare Pages deploy
#
# Variables de entorno para Vite (build-time): se configuran en el
# dashboard de Cloudflare Pages, NO acá.
#   Cloudflare → Workers & Pages → echo-alfa-ritz → Settings →
#   Environment variables → Production:
#     VITE_SUPABASE_URL =
#     VITE_SUPABASE_PUBLISHABLE_KEY = sb_publishable_...
#
# Para local dev: usar pwa/.env.local (gitignored).
# Para secrets reales del Worker (no build-time): wrangler pages secret put.

#:schema node_modules/wrangler/config-schema.json
name = "echo-alfa-ritz"
pages_build_output_dir = "dist"


[vars]
VITE_SUPABASE_URL = ""
VITE_SUPABASE_PUBLISHABLE_KEY = ""