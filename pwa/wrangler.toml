# wrangler.toml — Cloudflare Pages deploy
#
# Uso manual (desde pwa/):
#   pnpm exec wrangler pages deploy dist
#
# Uso automático (GitHub → Cloudflare Pages):
#   Conectar repo en https://dash.cloudflare.com → Workers & Pages → Create
#   Build command: pnpm build
#   Build output dir: pwa/dist
#   Root dir: (dejar vacío)

#:schema node_modules/wrangler/config-schema.json
name = "echo-alfa-ritz"
pages_build_output_dir = "dist"

# Las Supabase vars (VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY) son
# build-time vars de Vite. Se configuran en el dashboard de Cloudflare Pages
# (NO commiteadas acá, NO en `wrangler pages secret put`):
#   Cloudflare → Workers & Pages → echo-alfa-ritz → Settings → Environment
#   variables → Production → agregar:
#     VITE_SUPABASE_URL = https://cxonjoojvkmpxkessasp.supabase.co
#     VITE_SUPABASE_PUBLISHABLE_KEY = sb_publishable_...
#
# Para secrets REALES del Worker (SERVICE_ROLE_KEY, etc.) usá
# `wrangler pages secret put` y accedelas via context.env.
